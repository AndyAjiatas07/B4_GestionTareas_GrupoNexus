<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Sistema de Gestión Escolar</title>
    <h:outputStylesheet library="primefaces" name="primeflex/primeflex.css"/>
    <h:outputStylesheet library="primefaces" name="themes/saga/theme.css"/>
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css"/>
</h:head>

<h:body>
    <div class="surface-ground min-h-screen p-4">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-4xl font-bold text-900 mb-2">Sistema de Gestión Escolar</h1>
            <p class="text-lg text-600">Panel de Administración de Cursos</p>
        </div>

        <!-- Botón Agregar Curso -->
        <div class="flex justify-content-center mb-6">
            <p:commandButton value="Agregar Nuevo Curso"
                             icon="pi pi-plus"
                             styleClass="p-button-success p-button-lg"
                             action="#{cursoBean.agregarCurso}"/>
        </div>

        <!-- Lista de Cursos en línea horizontal -->
        <div class="flex justify-content-center">
            <div class="grid col-12">
                <!-- Curso 1 -->
                <div class="col-12 md:col-3">
                    <div class="surface-card p-4 shadow-2 border-round text-center">
                        <i class="pi pi-calculator text-6xl text-blue-500 mb-3"></i>
                        <h3 class="text-xl font-bold text-900 mb-2">Matemáticas</h3>
                        <p class="text-600 mb-4">Álgebra y Geometría</p>
                        <p:commandButton value="Entrar al Curso"
                                         icon="pi pi-arrow-right"
                                         styleClass="p-button-primary w-full"
                                         action="#{cursoBean.entrarCurso('matematicas')}"/>
                    </div>
                </div>

                <!-- Curso 2 -->
                <div class="col-12 md:col-3">
                    <div class="surface-card p-4 shadow-2 border-round text-center">
                        <i class="pi pi-book text-6xl text-green-500 mb-3"></i>
                        <h3 class="text-xl font-bold text-900 mb-2">ingles</h3>
                        <p class="text-600 mb-4">Literatura y Gramática</p>
                        <p:commandButton value="Entrar al Curso"
                                         icon="pi pi-arrow-right"
                                         styleClass="p-button-primary w-full"
                                         action="#{cursoBean.entrarCurso('lenguaje')}"/>
                    </div>
                </div>

                <!-- Curso 3 -->
                <div class="col-12 md:col-3">
                    <div class="surface-card p-4 shadow-2 border-round text-center">
                        <i class="pi pi-globe text-6xl text-orange-500 mb-3"></i>
                        <h3 class="text-xl font-bold text-900 mb-2">Ciencias sociales</h3>
                        <p class="text-600 mb-4">Biología y Química</p>
                        <p:commandButton value="Entrar al Curso"
                                         icon="pi pi-arrow-right"
                                         styleClass="p-button-primary w-full"
                                         action="#{cursoBean.entrarCurso('ciencias')}"/>
                    </div>
                </div>

                <!-- Curso 4 -->
                <div class="col-12 md:col-3">
                    <div class="surface-card p-4 shadow-2 border-round text-center">
                        <i class="pi pi-map text-6xl text-purple-500 mb-3"></i>
                        <h3 class="text-xl font-bold text-900 mb-2">Ciencias Naturales</h3>
                        <p class="text-600 mb-4">Historia Universal</p>
                        <p:button value="Entrar al Curso"
                                         icon="pi pi-arrow-right"
                                         styleClass="p-button-primary w-full"
                                  outcome="profesor.xhtml"/>
                    </div>
                </div>
            </div>
        </div>
    </div>
</h:body>
</html>
