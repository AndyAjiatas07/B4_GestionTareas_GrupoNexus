<!DOCTYPE html>
<html xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>MIS CURSOS NEXUS</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
    <link rel="stylesheet" href="https://unpkg.com/primeflex/themes/primeone-dark.css"/>
</h:head>

<h:body>
    <div class="surface-ground min-h-screen p-4">
        <h:form id="formulario-cursos">
            <p:messages id="mensajes" showDetail="true" autoUpdate="true" closable="true"/>
            <div class="text-center mb-6">
                <h1 align="center" class="text-4xl font-bold text-900 mb-2">Gestión de Cursos</h1>
                <p align="center" class="text-lg text-600">Sistema Escolar Administración</p>
            </div>

            <div class="flex justify-content-center mb-6">
                <div class="col-12 lg:col-10 xl:col-8">
                    <div class="grid">
                        <div class="col-12 sm:col-6 lg:col-3">
                            <div class="surface-card p-4 shadow-2 border-round text-center h-full">
                                <div class="mb-3">
                                    <img src="https://i.pinimg.com/474x/80/a5/85/80a585f911ece990b6fac62b5becd0fd.jpg"
                                         alt="Matemáticas"
                                         class="border-round w-full"/>
                                </div>
                                <h3 class="text-xl font-bold text-900 mb-2">Matemáticas</h3>
                                <p class="text-600 mb-4">Ciencias Exactas</p>
                                <p:button value="Entrar a este curso"
                                                 icon="pi pi-arrow-right"
                                                 styleClass="p-button-primary w-full"
                                                 outcome="profesorMatematicas.xhtml"/>
                            </div>
                        </div>

                        <div class="col-12 sm:col-6 lg:col-3">
                            <div class="surface-card p-4 shadow-2 border-round text-center h-full">
                                <div class="mb-3">
                                    <img src="https://portadasparacuadernos.com/wp-content/uploads/2023/09/Portada-de-Ingles-2.png"
                                         alt="Lenguaje"
                                         class="border-round w-full"/>
                                </div>
                                <h3 class="text-xl font-bold text-900 mb-2">Ingles</h3>
                                <p class="text-600 mb-4">Comunicacion y Lenguaje</p>
                                <p:button value="Entrar a este curso"
                                                 icon="pi pi-arrow-right"
                                                 styleClass="p-button-primary w-full"
                                                 />
                            </div>
                        </div>

                        <div class="col-12 sm:col-6 lg:col-3">
                            <div class="surface-card p-4 shadow-2 border-round text-center h-full">
                                <div class="mb-3">
                                    <img src="https://i.pinimg.com/236x/29/11/90/291190363296b9ab22893a59c2f83b91.jpg"
                                         alt="Ciencias"
                                         class="border-round w-full"/>
                                </div>
                                <h3 class="text-xl font-bold text-900 mb-2">Ciencias Sociles</h3>
                                <p class="text-600 mb-4">Formacion Ciudadana</p>
                                <p:button value="Entrar a este curso"
                                                 icon="pi pi-arrow-right"
                                                 styleClass="p-button-primary w-full"
                                                 outcome="profesorSociales.xhtml"/>
                            </div>
                        </div>

                        <div class="col-12 sm:col-6 lg:col-3">
                            <div class="surface-card p-4 shadow-2 border-round text-center h-full">
                                <div class="mb-3">
                                    <img src="https://i.pinimg.com/736x/3e/dd/a6/3edda66f5719411ab13dda2c9cf57e60.jpg"
                                         alt="Historia"
                                         class="border-round w-full"/>
                                </div>
                                <h3 class="text-xl font-bold text-900 mb-2">Ciencias Naturales</h3>
                                <p class="text-600 mb-4">La Humanidad</p>
                                <p:button value="Entrar a este curso"
                                          icon="pi pi-arrow-right"
                                          styleClass="p-button-primary w-full"
                                          outcome="profesor.xhtml"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-content-center">
                <p:commandButton value="Agregar Curso"
                                 icon="pi pi-plus"
                                 styleClass="p-button-success p-button-lg"
                                 actionListener="#{cursoController.agregarCurso}"
                                 update=":formulario-modal:panel-curso"
                                 oncomplete="PF('dialogoCurso').show()"/>
            </div>
        </h:form>

        <h:form id="formulario-modal">
            <p:dialog header="Agregar Nuevo Curso" modal="true"
                      showEffect="fade" widgetVar="dialogoCurso" responsive="true">
                <p:outputPanel id="panel-curso" class="ui-fluid">
                    <div class="field">
                        <p:outputLabel for="nombreCurso" value="Nombre del Curso"/>
                        <p:inputText id="nombreCurso"
                                     value="#{cursoController.cursoSeleccionado.nombreCurso}"
                                     required="true"/>
                    </div>
                    <div class="field">
                        <p:outputLabel for="descripcionCurso" value="Descripción"/>
                        <p:inputTextarea id="descripcionCurso"
                                         value="#{cursoController.cursoSeleccionado.descripcionCurso}"
                                         rows="3" autoResize="true"
                                         required="true"/>
                    </div>
                    <div class="field">
                        <p:outputLabel for="codigoProfesor" value="Código del Profesor"/>
                        <p:inputText id="codigoProfesor"
                                     value="#{cursoController.cursoSeleccionado.profesor.codigoUsuario}"
                                     required="true"/>
                    </div>
                </p:outputPanel>

                <f:facet name="footer">
                    <p:commandButton value="Guardar" icon="pi pi-check"
                                     process="panel-curso @this"
                                     actionListener="#{cursoController.guardarCurso}"
                                     update=":formulario-cursos:mensajes"
                                     oncomplete="PF('dialogoCurso').hide()"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times"
                                     onclick="PF('dialogoCurso').hide()"
                                     class="ui-button-secondary" type="button"/>
                </f:facet>
            </p:dialog>
        </h:form>
    </div>
</h:body>
</html>
