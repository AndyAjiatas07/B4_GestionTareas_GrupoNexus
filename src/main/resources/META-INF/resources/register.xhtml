<!DOCTYPE html>
<h:html xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Registro - Nexus Portal</title>
        <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primefaces@10.0.0/themes/saga-blue.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css"/>

        <style>
            body {
                margin: 0;
                height: 100vh;
                background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('https://static.wixstatic.com/media/128120_2149451250ff47698d7060f748273a41~mv2.png/v1/fit/w_2500,h_1330,al_c/128120_2149451250ff47698d7060f748273a41~mv2.png');
                background-size: cover;
                background-position: center;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            .login-container {
                width: 100%;
                max-width: 420px;
                background-color: #ffffffee;
                padding: 2.5rem;
                border-radius: 12px;
                box-shadow: 0 8px 30px rgba(0,0,0,0.5);
                animation: fadeIn 1s ease;
            }

            .login-image {
                width: 100%;
                height: auto;
                border-radius: 8px;
                margin-bottom: 1rem;
            }

            .title-center {
                text-align: center;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 0.5rem;
                font-size: 1.8rem;
                color: #2c3e50;
                margin-bottom: 1.5rem;
            }

            .text-muted {
                font-size: 0.9rem;
                color: #666666;
                text-align: center;
                margin-bottom: 1.5rem;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px);}
                to { opacity: 1; transform: translateY(0);}
            }
        </style>
    </h:head>

    <h:body>
        <h:form id="register-form">
            <p:growl id="register-messages" showDetail="true" autoUpdate="true" />

            <div class="flex align-items-center justify-content-center h-screen">
                <div class="login-container">
                    <!-- Imagen -->
                    <img src="https://static3.depositphotos.com/1005574/198/v/950/depositphotos_1982796-stock-illustration-login-icon-button.jpg"
                         alt="Imagen de registro"
                         class="login-image" />

                    <div class="title-center">
                        <i class="pi pi-user-plus"></i>
                        <span>Registro de Usuario</span>
                    </div>

                    <p class="text-muted">Por favor, completa tus datos para crear una cuenta.</p>

                    <!-- Nombre -->
                    <div class="input-group mt-2">
                        <p:inputText id="nombre" value="#{registerLoginController.usuario.nombre}"
                                     label="Nombre" placeholder="Nombre completo"
                                     required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <!-- Email -->
                    <div class="input-group mt-2">
                        <p:inputText id="email" value="#{registerLoginController.usuario.email}"
                                     label="Correo" placeholder="Correo electrónico"
                                     required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <!-- Contraseña -->
                    <div class="input-group mt-2">
                        <p:password id="password" value="#{registerLoginController.usuario.password}"
                                    label="Contraseña" placeholder="Contraseña"
                                    required="true" styleClass="p-inputtext-lg w-full" feedback="false"/>
                    </div>

                    <!-- Rol -->
                    <div class="input-group mt-2">
                        <p:selectOneMenu id="rol" value="#{registerLoginController.usuario.rol}"
                                         styleClass="w-full p-inputtext-lg">
                            <f:selectItem itemLabel="Seleccione rol" itemValue="" />
                            <f:selectItem itemLabel="Alumno" itemValue="ALUMNO" />
                            <f:selectItem itemLabel="Profesor" itemValue="PROFESOR" />
                        </p:selectOneMenu>
                    </div>

                    <!-- Botón de registro -->
                    <div class="btn-group mt-3">
                        <p:commandButton value="Registrarse"
                                         icon="pi pi-check"
                                         action="#{registerLoginController.registrar}"
                                         update="register-messages"
                                         styleClass="ui-button-primary w-full p-button-lg" />
                    </div>

                    <!-- Botón para ir a login -->
                    <div class="btn-group mt-2">
                        <p:button value="¿Ya tienes cuenta? Login"
                                  outcome="login.xhtml"
                                  icon="pi pi-sign-in"
                                  styleClass="ui-button-secondary w-full p-button-lg" />
                    </div>
                </div>
            </div>
        </h:form>
    </h:body>
</h:html>
