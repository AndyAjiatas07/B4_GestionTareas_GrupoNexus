<!DOCTYPE html>
<h:html xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui">

    <h:head>
        <title>Registro - Nexus Portal</title>

        <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primefaces@10.0.0/themes/saga-blue.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css"/>

        <style>
            body {
                margin: 0;
                height: 100vh;
                background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('https://static.wixstatic.com/media/128120_d716ee8e434e439c820e824c2e46c7db~mv2.jpg/v1/fill/w_640,h_400,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/128120_d716ee8e434e439c820e824c2e46c7db~mv2.jpg');
                background-size: cover;
                background-position: center;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            .register-container {
                width: 100%;
                max-width: 500px;
                background-color: #ffffffee;
                padding: 2.5rem;
                border-radius: 12px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
                animation: fadeIn 1s ease;
            }

            h2 {
                text-align: center;
                color: #2c3e50;
                margin-bottom: 1.5rem;
            }

            .input-group {
                margin-bottom: 1.2rem;
            }

            .back-link {
                text-align: center;
                margin-top: 1.5rem;
            }

            .back-link a {
                color: #007ad9;
                text-decoration: none;
            }

            .back-link a:hover {
                text-decoration: underline;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </h:head>

    <h:body>
        <h:form id="register-form">
            <div class="flex align-items-center justify-content-center h-screen">
                <div class="register-container">
                    <h2><i class="pi pi-user-plus" style="margin-right: 0.5rem;"></i>Crear Cuenta</h2>

                    <div class="input-group">
                        <p:inputText id="nombre" value="#{userController.firstName}"
                                     label="Nombre" placeholder="Nombre"
                                     required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <div class="input-group">
                        <p:inputText id="apellido" value="#{userController.lastName}"
                                     label="Apellido" placeholder="Apellido"
                                     required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <div class="input-group">
                        <p:inputText id="username" value="#{userController.newUsername}"
                                     label="Usuario" placeholder="Nombre de usuario"
                                     required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <div class="input-group">
                        <p:password id="password" value="#{userController.newPassword}"
                                    label="Contraseña" placeholder="Contraseña"
                                    required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <div class="input-group">
                        <p:password id="confirmPassword" value="#{userController.confirmPassword}"
                                    label="Confirmar Contraseña" placeholder="Confirmar contraseña"
                                    required="true" styleClass="p-inputtext-lg w-full" />
                    </div>

                    <div class="btn-group">
                        <p:commandButton value="Registrarse"
                                         icon="pi pi-user-plus"
                                         actionListener="#{userController.register}"
                                         update="register-form"
                                         styleClass="ui-button-success w-full p-button-lg" />
                    </div>

                    <div class="back-link">
                        <h:link value="¿Ya tienes cuenta? Inicia sesión" outcome="login" />
                    </div>
                </div>
            </div>
        </h:form>
    </h:body>
</h:html>
