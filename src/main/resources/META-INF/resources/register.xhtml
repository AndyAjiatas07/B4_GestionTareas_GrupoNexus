<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Registro</title>
</h:head>
<h:body>
    <h:form>
        <h2>Registrarse</h2>

        <h:messages globalOnly="true" style="color:red" />

        <h:outputLabel for="nombre" value="Nombre: " />
        <h:inputText id="nombre" value="#{registerLoginController.usuario.nombre}" required="true" />

        <br/><br/>

        <h:outputLabel for="email" value="Correo: " />
        <h:inputText id="email" value="#{registerLoginController.usuario.email}" required="true" />

        <br/><br/>

        <h:outputLabel for="password" value="Contraseña: " />
        <h:inputSecret id="password" value="#{registerLoginController.usuario.password}" required="true" />

        <br/><br/>

        <h:commandButton value="Registrarse" action="#{registerLoginController.registrar}" />
        <h:commandButton value="Cancelar" action="login.xhtml?faces-redirect=true" immediate="true" />
    </h:form>
</h:body>
</html>
