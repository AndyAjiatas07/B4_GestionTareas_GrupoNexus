<!DOCTYPE html>
<h:html xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Login - Nexus Portal</title>
        <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primefaces@10.0.0/themes/saga-blue.css"/>
        <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css"/>

        <style>
            body {
                margin: 0;
                height: 100vh;
                background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('https://static.wixstatic.com/media/128120_2149451250ff47698d7060f748273a41~mv2.png/v1/fit/w_2500,h_1330,al_c/128120_2149451250ff47698d7060f748273a41~mv2.png');
                background-size: cover;
                background-position: center;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            .login-container {
                width: 100%;
                max-width: 420px;
                background-color: #ffffffee;
                padding: 2.5rem;
                border-radius: 12px;
                box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
                animation: fadeIn 1s ease;
            }

            .login-image {
                width: 100%;
                height: auto;
                border-radius: 8px;
                margin-bottom: 1rem;
            }

            .title-center {
                text-align: center;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 0.5rem;
                font-size: 1.8rem;
                color: #2c3e50;
                margin-bottom: 1.5rem;
            }

            .text-muted {
                font-size: 0.9rem;
                color: #666666;
                text-align: center;
                margin-bottom: 1.5rem;
            }

            .register-link {
                text-align: center;
                margin-top: 1rem;
            }

            .register-link a {
                color: #007ad9;
                text-decoration: none;
                font-weight: bold;
            }

            .register-link a:hover {
                text-decoration: underline;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </h:head>

    <h:body>
        <h:form id="login-form">
            <p:growl id="login-messages" showDetail="true" autoUpdate="true" />

            <h:panelGroup rendered="#{!userController.isLoggedIn}">
                <div class="flex align-items-center justify-content-center h-screen">
                    <div class="login-container">
                        <!-- Imagen de cabecera ACTUALIZADA -->
                        <img src="https://static3.depositphotos.com/1005574/198/v/950/depositphotos_1982796-stock-illustration-login-icon-button.jpg"
                             alt="Imagen de inicio"
                             class="login-image" />

                        <!-- Título centrado con ícono -->
                        <div class="title-center">
                            <i class="pi pi-lock"></i>
                            <span>Acceso Seguro</span>
                        </div>

                        <p class="text-muted">Bienvenido al Portal Nexus. Por favor, ingresa tus credenciales.</p>

                        <div class="input-group">
                            <p:inputText id="username" value="#{userController.username}"
                                         label="Usuario" placeholder="Usuario"
                                         required="true" styleClass="p-inputtext-lg w-full" />
                        </div>

                        <div class="input-group">
                            <p:password id="password" value="#{userController.password}"
                                        label="Contraseña" placeholder="Contraseña"
                                        required="true" styleClass="p-inputtext-lg w-full" feedback="false"/>
                        </div>

                        <div class="btn-group">
                            <p:commandButton value="Iniciar sesión"
                                             icon="pi pi-sign-in"
                                             actionListener="#{userController.login}"
                                             update="login-messages"
                                             styleClass="ui-button-primary w-full p-button-lg" />
                        </div>

                        <div class="register-link">
                            <h:link value="¿No tienes cuenta? Regístrate" outcome="register" />
                        </div>
                    </div>
                </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{userController.isLoggedIn}">
                <div class="flex align-items-center justify-content-center h-screen">
                    <div class="card text-center p-4">
                        <p style="font-size: 1.2rem;">Bienvenido, <strong>#{userController.username}</strong></p>
                        <p:commandButton value="Cerrar sesión"
                                         icon="pi pi-sign-out"
                                         actionListener="#{userController.logout}"
                                         styleClass="ui-button-danger mt-3" />
                    </div>
                </div>
            </h:panelGroup>
        </h:form>
    </h:body>
</h:html>
